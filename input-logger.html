<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Input Logger</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #191b20;
      --panel-2: #20232a;
      --text: #f4f6fb;
      --muted: #a5adba;
      --line: #313640;
      --accent: #55c2ff;
      --accent-2: #7be495;
      --danger: #ff6b7a;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    main {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      box-shadow: var(--shadow);
      font-weight: 700;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
    }

    .status.recording .dot {
      background: var(--accent-2);
      box-shadow: 0 0 0 6px rgba(123, 228, 149, 0.16);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    button,
    input {
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
    }

    button {
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #061018;
    }

    button.success {
      border-color: rgba(123, 228, 149, 0.6);
      color: #cffff0;
    }

    button.danger {
      color: #ffd9dd;
      border-color: rgba(255, 107, 122, 0.55);
    }

    .grid {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
    }

    .stats,
    .task-card {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #14161b;
    }

    .stat span {
      color: var(--muted);
    }

    .task-stage {
      min-height: 260px;
      margin: 14px;
      padding: 18px;
      border: 1px dashed #4a515f;
      border-radius: 8px;
      background: #12141a;
      outline: none;
    }

    .task-stage:focus-within,
    .task-stage:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(85, 194, 255, 0.12);
    }

    .instruction {
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .task-ui {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .task-input {
      width: 100%;
      padding: 13px 14px;
      background: #0b0d10;
      color: var(--text);
      outline: none;
    }

    .drag-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .drag-item,
    .drop-zone {
      min-height: 120px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      font-weight: 800;
      text-align: center;
    }

    .drag-item {
      border: 1px solid rgba(85, 194, 255, 0.7);
      background: rgba(85, 194, 255, 0.16);
      cursor: grab;
      user-select: none;
    }

    .drag-item:active {
      cursor: grabbing;
    }

    .drop-zone {
      border: 1px dashed rgba(123, 228, 149, 0.7);
      background: rgba(123, 228, 149, 0.1);
      color: #d7ffe6;
    }

    .drop-zone.ready {
      border-style: solid;
      background: rgba(123, 228, 149, 0.22);
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 650px;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 16px;
      background: #0b0d10;
      color: #d8f3ff;
      font: 14px/1.55 Consolas, "SFMono-Regular", Menlo, monospace;
      tab-size: 2;
    }

    .toast {
      min-height: 24px;
      margin-top: 10px;
      color: var(--accent-2);
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 840px) {
      main {
        width: min(100% - 20px, 1220px);
        padding: 20px 0;
      }

      header,
      .grid,
      .drag-row {
        display: grid;
        grid-template-columns: 1fr;
      }

      .status {
        justify-self: start;
      }
    }
  </style>
  <script src="./app.js" defer></script>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Task Input Logger</h1>
        <p>측정 시작을 누르면 과제가 나오고, 수행 중 키보드/마우스 이벤트를 JSON으로 기록합니다.</p>
      </div>
      <div class="status" id="status">
        <span class="dot"></span>
        <span id="statusText">대기 중</span>
      </div>
    </header>

    <div class="controls">
      <button class="primary" id="startBtn">측정 시작</button>
      <button class="success" id="saveBtn" disabled>측정 종료 + 서버 전송</button>
      <button id="newTaskBtn">다음 과제</button>
      <button id="copyBtn">JSON 복사</button>
      <button id="downloadBtn">JSON 다운로드</button>
      <button class="danger" id="clearBtn">초기화</button>
    </div>

    <section class="grid">
      <aside class="panel">
        <h2>세션 상태</h2>
        <div class="stats">
          <div class="stat"><span>키 이벤트</span><strong id="keyCount">0</strong></div>
          <div class="stat"><span>마우스 이벤트</span><strong id="mouseCount">0</strong></div>
          <div class="stat"><span>과제 상태</span><strong id="taskStatus">없음</strong></div>
          <div class="stat"><span>마지막 키</span><strong id="lastKey">-</strong></div>
          <div class="stat"><span>마지막 좌표</span><strong id="lastCoord">-</strong></div>
        </div>
        <div class="task-card">
          <p class="hint">브라우저 보안상 이 페이지가 포커스된 동안의 입력만 수집됩니다.</p>
          <p class="hint">서버 전송 주소: <strong id="serverUrlLabel">http://127.0.0.1:3000/logs</strong></p>
        </div>
      </aside>

      <section class="panel">
        <h2>과제</h2>
        <div class="task-stage" id="taskStage" tabindex="0">
          <div class="instruction" id="instruction">측정 시작을 누르면 과제가 배정됩니다.</div>
          <div class="task-ui" id="taskUi"></div>
        </div>
      </section>

      <section class="panel">
        <h2>JSON 로그</h2>
        <textarea id="output" readonly spellcheck="false"></textarea>
      </section>
    </section>

    <div class="toast" id="toast" aria-live="polite"></div>
  </main>
</body>
</html>
