<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Input Logger</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #191b20;
      --panel-2: #20232a;
      --text: #f4f6fb;
      --muted: #a5adba;
      --line: #313640;
      --accent: #55c2ff;
      --accent-2: #7be495;
      --danger: #ff6b7a;
      --warn: #ffd166;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    main {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      box-shadow: var(--shadow);
      font-weight: 700;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
    }

    .status.recording .dot {
      background: var(--accent-2);
      box-shadow: 0 0 0 6px rgba(123, 228, 149, 0.16);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    button,
    input {
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
    }

    button {
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #061018;
    }

    button.success {
      border-color: rgba(123, 228, 149, 0.6);
      color: #cffff0;
    }

    button.danger {
      color: #ffd9dd;
      border-color: rgba(255, 107, 122, 0.55);
    }

    .grid {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
    }

    .stats,
    .task-card {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #14161b;
    }

    .stat span {
      color: var(--muted);
    }

    .task-stage {
      min-height: 260px;
      margin: 14px;
      padding: 18px;
      border: 1px dashed #4a515f;
      border-radius: 8px;
      background: #12141a;
      outline: none;
    }

    .task-stage:focus-within,
    .task-stage:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(85, 194, 255, 0.12);
    }

    .instruction {
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .task-ui {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .task-input {
      width: 100%;
      padding: 13px 14px;
      background: #0b0d10;
      color: var(--text);
      outline: none;
    }

    .drag-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .drag-item,
    .drop-zone {
      min-height: 120px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      font-weight: 800;
      text-align: center;
    }

    .drag-item {
      border: 1px solid rgba(85, 194, 255, 0.7);
      background: rgba(85, 194, 255, 0.16);
      cursor: grab;
      user-select: none;
    }

    .drag-item:active {
      cursor: grabbing;
    }

    .drop-zone {
      border: 1px dashed rgba(123, 228, 149, 0.7);
      background: rgba(123, 228, 149, 0.1);
      color: #d7ffe6;
    }

    .drop-zone.ready {
      border-style: solid;
      background: rgba(123, 228, 149, 0.22);
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 650px;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 16px;
      background: #0b0d10;
      color: #d8f3ff;
      font: 14px/1.55 Consolas, "SFMono-Regular", Menlo, monospace;
      tab-size: 2;
    }

    .toast {
      min-height: 24px;
      margin-top: 10px;
      color: var(--accent-2);
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 840px) {
      main {
        width: min(100% - 20px, 1220px);
        padding: 20px 0;
      }

      header,
      .grid,
      .drag-row {
        display: grid;
        grid-template-columns: 1fr;
      }

      .status {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Task Input Logger</h1>
        <p>측정 시작을 누르면 과제가 나오고, 수행 중 키보드/마우스 이벤트를 JSON으로 기록합니다.</p>
      </div>
      <div class="status" id="status">
        <span class="dot"></span>
        <span id="statusText">대기 중</span>
      </div>
    </header>

    <div class="controls">
      <button class="primary" id="startBtn">측정 시작</button>
      <button class="success" id="saveBtn" disabled>측정 종료 + JSON 저장</button>
      <button id="newTaskBtn">다음 과제</button>
      <button id="copyBtn">JSON 복사</button>
      <button class="danger" id="clearBtn">초기화</button>
    </div>

    <section class="grid">
      <aside class="panel">
        <h2>세션 상태</h2>
        <div class="stats">
          <div class="stat"><span>키 이벤트</span><strong id="keyCount">0</strong></div>
          <div class="stat"><span>마우스 이벤트</span><strong id="mouseCount">0</strong></div>
          <div class="stat"><span>과제 상태</span><strong id="taskStatus">없음</strong></div>
          <div class="stat"><span>마지막 키</span><strong id="lastKey">-</strong></div>
          <div class="stat"><span>마지막 좌표</span><strong id="lastCoord">-</strong></div>
        </div>
        <div class="task-card">
          <p class="hint">브라우저 보안상 이 페이지가 포커스된 동안의 입력만 수집됩니다.</p>
        </div>
      </aside>

      <section class="panel">
        <h2>과제</h2>
        <div class="task-stage" id="taskStage" tabindex="0">
          <div class="instruction" id="instruction">측정 시작을 누르면 과제가 배정됩니다.</div>
          <div class="task-ui" id="taskUi"></div>
        </div>
      </section>

      <section class="panel">
        <h2>JSON 로그</h2>
        <textarea id="output" readonly spellcheck="false"></textarea>
      </section>
    </section>

    <div class="toast" id="toast" aria-live="polite"></div>
  </main>

  <script>
    const tasks = [
      {
        id: "click-blue-button",
        type: "button_click",
        instruction: "아래 버튼을 한 번 클릭하세요.",
        buttonText: "TARGET BUTTON"
      },
      {
        id: "type-target-text",
        type: "text_input",
        instruction: "입력칸에 정확히 `CODEX 2026`을 입력하세요.",
        targetText: "CODEX 2026"
      },
      {
        id: "drag-card-to-target",
        type: "drag",
        instruction: "왼쪽 카드를 오른쪽 드롭 영역으로 드래그하세요.",
        dragText: "DRAG ME",
        dropText: "DROP HERE"
      }
    ];

    const logData = {
      session: null,
      task: null,
      task_events: [],
      key_events: [],
      mouse_events: []
    };

    let recording = false;
    let activeTask = null;
    let lastMoveAt = 0;
    let taskQueue = [];
    let taskIndex = -1;

    const status = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const output = document.getElementById("output");
    const keyCount = document.getElementById("keyCount");
    const mouseCount = document.getElementById("mouseCount");
    const taskStatus = document.getElementById("taskStatus");
    const lastKey = document.getElementById("lastKey");
    const lastCoord = document.getElementById("lastCoord");
    const toast = document.getElementById("toast");
    const taskStage = document.getElementById("taskStage");
    const instruction = document.getElementById("instruction");
    const taskUi = document.getElementById("taskUi");
    const saveBtn = document.getElementById("saveBtn");

    function epoch() {
      return Date.now();
    }

    function isoNow() {
      return new Date().toISOString();
    }

    function createSessionId() {
      return `session-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    }

    function normalizeKey(event) {
      if (event.key === " ") return "Space";
      return event.key || event.code || "Unidentified";
    }

    function mouseButtonName(event) {
      const names = ["left", "middle", "right", "back", "forward"];
      return names[event.button] || `button${event.button}`;
    }

    function coords(event) {
      return [Math.round(event.clientX), Math.round(event.clientY)];
    }

    function setRecording(nextState) {
      recording = nextState;
      status.classList.toggle("recording", recording);
      statusText.textContent = recording ? "측정 중" : "대기 중";
      saveBtn.disabled = !recording;
      if (recording) taskStage.focus();
      render();
    }

    function pushTaskEvent(eventName, detail = {}) {
      logData.task_events.push({
        Event: eventName,
        Epoch: epoch(),
        Detail: detail
      });
      render();
    }

    function render() {
      keyCount.textContent = logData.key_events.length;
      mouseCount.textContent = logData.mouse_events.length;
      taskStatus.textContent = logData.session?.task_completed ? "완료" : activeTask ? "진행 중" : "없음";
      output.value = JSON.stringify(logData, null, 2);
    }

    function showToast(message) {
      toast.textContent = message;
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.textContent = "";
      }, 1800);
    }

    function resetLog() {
      logData.session = null;
      logData.task = null;
      logData.task_events = [];
      logData.key_events = [];
      logData.mouse_events = [];
      activeTask = null;
      taskQueue = [];
      taskIndex = -1;
      lastKey.textContent = "-";
      lastCoord.textContent = "-";
      instruction.textContent = "측정 시작을 누르면 과제가 배정됩니다.";
      taskUi.innerHTML = "";
      setRecording(false);
    }

    function pickTask() {
      return tasks[Math.floor(Math.random() * tasks.length)];
    }

    function makeTaskQueue() {
      return [...tasks].sort(() => Math.random() - 0.5);
    }

    function assignNextTask() {
      if (!recording || !logData.session) return;
      taskIndex += 1;
      if (taskIndex >= taskQueue.length) {
        activeTask = null;
        logData.task = null;
        logData.session.all_tasks_completed = true;
        logData.session.completed_at = isoNow();
        instruction.textContent = "모든 과제가 끝났습니다. `측정 종료 + JSON 저장`을 눌러 저장하세요.";
        taskUi.innerHTML = "";
        pushTaskEvent("all tasks completed", { total_tasks: taskQueue.length });
        showToast("모든 과제 완료. JSON 저장 버튼을 눌러주세요.");
        render();
        return;
      }
      logData.session.current_task_index = taskIndex;
      logData.session.task_completed = false;
      assignTask(taskQueue[taskIndex]);
    }

    function assignTask(task = pickTask()) {
      activeTask = task;
      logData.task = {
        id: task.id,
        type: task.type,
        instruction: task.instruction,
        target_text: task.targetText || null,
        index: taskIndex,
        total: taskQueue.length || 1,
        assigned_at: isoNow()
      };
      const numberLabel = taskQueue.length ? `과제 ${taskIndex + 1}/${taskQueue.length}: ` : "";
      instruction.textContent = `${numberLabel}${task.instruction}`;
      taskUi.innerHTML = "";
      renderTask(task);
      pushTaskEvent("task assigned", { task_id: task.id, task_type: task.type });
    }

    function renderTask(task) {
      if (task.type === "button_click") {
        const button = document.createElement("button");
        button.className = "primary";
        button.textContent = task.buttonText;
        button.addEventListener("click", () => completeTask({ clicked: task.buttonText }));
        taskUi.append(button);
        return;
      }

      if (task.type === "text_input") {
        const input = document.createElement("input");
        input.className = "task-input";
        input.placeholder = task.targetText;
        input.autocomplete = "off";
        input.spellcheck = false;
        input.addEventListener("input", () => {
          if (input.value === task.targetText) {
            completeTask({ typed_text: input.value });
          }
        });
        taskUi.append(input);
        input.focus();
        return;
      }

      if (task.type === "drag") {
        const row = document.createElement("div");
        row.className = "drag-row";

        const item = document.createElement("div");
        item.className = "drag-item";
        item.draggable = true;
        item.id = "dragItem";
        item.textContent = task.dragText;
        item.addEventListener("dragstart", (event) => {
          event.dataTransfer.setData("text/plain", "dragItem");
          pushTaskEvent("drag started", { task_id: task.id });
        });

        const dropZone = document.createElement("div");
        dropZone.className = "drop-zone";
        dropZone.textContent = task.dropText;
        dropZone.addEventListener("dragover", (event) => {
          event.preventDefault();
          dropZone.classList.add("ready");
        });
        dropZone.addEventListener("dragleave", () => {
          dropZone.classList.remove("ready");
        });
        dropZone.addEventListener("drop", (event) => {
          event.preventDefault();
          dropZone.classList.remove("ready");
          dropZone.textContent = "DONE";
          completeTask({ dropped: true });
        });

        row.append(item, dropZone);
        taskUi.append(row);
      }
    }

    function completeTask(detail = {}) {
      if (!recording || !activeTask || logData.session?.task_completed) return;
      logData.session.task_completed = true;
      logData.session.last_task_completed_at = isoNow();
      pushTaskEvent("task completed", { task_id: activeTask.id, ...detail });
      showToast("과제 완료. 다음 과제로 넘어갑니다.");
      render();
      window.setTimeout(assignNextTask, 650);
    }

    function addKeyEvent(event, action) {
      if (!recording) return;
      logData.key_events.push({
        Event: action,
        Epoch: epoch(),
        Key: normalizeKey(event)
      });
      lastKey.textContent = normalizeKey(event);
      render();
    }

    function addMouseEvent(event, action) {
      if (!recording) return;
      const point = coords(event);
      logData.mouse_events.push({
        Event: action,
        Epoch: epoch(),
        Coordinates: point
      });
      lastCoord.textContent = `${point[0]}, ${point[1]}`;
      render();
    }

    function downloadJson() {
      const blob = new Blob([JSON.stringify(logData, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      const sessionId = logData.session?.id || createSessionId();
      link.href = URL.createObjectURL(blob);
      link.download = `${sessionId}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    document.addEventListener("keydown", (event) => {
      if (event.repeat) return;
      addKeyEvent(event, "pressed");
    });

    document.addEventListener("keyup", (event) => {
      addKeyEvent(event, "released");
    });

    document.addEventListener("mousemove", (event) => {
      const now = performance.now();
      if (now - lastMoveAt < 50) return;
      lastMoveAt = now;
      addMouseEvent(event, "movement");
    });

    document.addEventListener("mousedown", (event) => {
      addMouseEvent(event, `${mouseButtonName(event)} press`);
    });

    document.addEventListener("mouseup", (event) => {
      addMouseEvent(event, `${mouseButtonName(event)} release`);
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      resetLog();
      logData.session = {
        id: createSessionId(),
        started_at: isoNow(),
        ended_at: null,
        monitor_width: window.screen.width,
        monitor_height: window.screen.height,
        task_completed: false,
        all_tasks_completed: false,
        current_task_index: -1,
        total_tasks: tasks.length
      };
      taskQueue = makeTaskQueue();
      taskIndex = -1;
      setRecording(true);
      assignNextTask();
      showToast("측정을 시작했습니다.");
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      if (!logData.session) return;
      logData.session.ended_at = isoNow();
      pushTaskEvent("measurement saved", { task_completed: Boolean(logData.session.task_completed) });
      setRecording(false);
      downloadJson();
      showToast("JSON 파일로 저장했습니다.");
    });

    document.getElementById("newTaskBtn").addEventListener("click", () => {
      if (!recording || !logData.session) {
        showToast("먼저 측정 시작을 눌러주세요.");
        return;
      }
      assignNextTask();
      showToast("다음 과제로 넘어갔습니다.");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      resetLog();
      showToast("초기화했습니다.");
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      await navigator.clipboard.writeText(output.value);
      showToast("JSON을 클립보드에 복사했습니다.");
    });

    resetLog();
  </script>
</body>
</html>
